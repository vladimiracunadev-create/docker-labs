services:
  api:
    build: .
    container_name: python_api
    ports:
      - "5000:5000"
    healthcheck:
      # curl esta instalado por el Dockerfile (apt-get install curl).
      # wget NO esta disponible en python:3.12-slim — usar curl evita el fallo.
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
