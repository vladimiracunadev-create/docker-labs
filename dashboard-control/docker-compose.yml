services:
  control-center:
    build:
      context: ..
      dockerfile: dashboard-control/Dockerfile
    container_name: docker_labs_control_center
    ports:
      - "9090:9090"
    environment:
      APP_REPO_ROOT: /workspace
      DOCKER_REPO_ROOT: ${CONTROL_CENTER_DOCKER_TARGET:?Use scripts/start-control-center.cmd or scripts/start-control-center.sh}
      DASHBOARD_PORT: 9090
    volumes:
      - type: bind
        source: ${CONTROL_CENTER_WORKSPACE_SOURCE:?Use scripts/start-control-center.cmd or scripts/start-control-center.sh}
        target: /workspace
      - type: bind
        source: ${CONTROL_CENTER_DOCKER_SOURCE:?Use scripts/start-control-center.cmd or scripts/start-control-center.sh}
        target: ${CONTROL_CENTER_DOCKER_TARGET:?Use scripts/start-control-center.cmd or scripts/start-control-center.sh}
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    restart: unless-stopped
