services:
  control-center:
    build:
      context: ..
      dockerfile: dashboard-control/Dockerfile
    container_name: docker_labs_control_center
    ports:
      - "9090:9090"
    environment:
      APP_REPO_ROOT: /workspace
      # DOCKER_REPO_ROOT must be the host-absolute path that the Docker daemon
      # can resolve when docker compose is called from inside this container.
      # On Windows + Docker Desktop: /run/desktop/mnt/host/<drive>/<path>
      # On Linux/macOS: the native host path (e.g. /home/user/docker-labs)
      # The start-control-center scripts compute this automatically.
      # Fallback /workspace works when host path == container path (Linux native Docker).
      DOCKER_REPO_ROOT: ${DOCKER_REPO_ROOT:-/workspace}
      DASHBOARD_PORT: 9090
    volumes:
      - ..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9090/api/overview"]
      interval: 15s
      timeout: 15s
      start_period: 20s
      retries: 5
    restart: unless-stopped
