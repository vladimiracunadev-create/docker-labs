name: Build Windows Installer

# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   push tag v*.*.*  → build + adjunta installer al GitHub Release
#   workflow_dispatch → build manual (artefacto descargable, sin upload)
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (ejemplo: 1.0.0)'
        required: false
        default: '1.0.0'

env:
  GO_VERSION: '1.21'
  # Fuerza Node.js 24 en las GitHub Actions para evitar errores de
  # compatibilidad con los runners actuales (deprecación de Node.js 20).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-windows-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    permissions:
      contents: write   # requerido para gh release upload

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Determinar versión ────────────────────────────────────────────────
      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}" -replace '^v', ''
          } elseif ("${{ github.event.inputs.version }}" -ne "") {
            $v = "${{ github.event.inputs.version }}"
          } else {
            # Leer version.txt como fuente unica de verdad
            $vFile = "version.txt"
            if (Test-Path $vFile) {
              $v = (Get-Content $vFile -Raw).Trim()
              Write-Host "Version leida de version.txt: $v"
            } else {
              $v = "1.0.0"
              Write-Host "version.txt no encontrado, usando default: $v"
            }
          }
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Building version: $v"

      # ── Configurar Go ─────────────────────────────────────────────────────
      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # cache: false porque el launcher solo usa stdlib (go.sum vacío).
          # setup-go@v5 con go.sum vacío intenta operaciones git en Windows
          # runners que resultan en exit code 128. Sin deps externas no hay
          # nada que cachear de todas formas.
          cache: false

      # ── Build launcher ────────────────────────────────────────────────────
      - name: Build Go launcher
        shell: pwsh
        run: |
          .\scripts\windows\build-launcher.ps1 -Version $env:VERSION

      - name: Verify launcher binary
        shell: pwsh
        run: |
          $exe = "launcher\docker-labs-launcher.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Launcher binary not found: $exe"
          }
          $size = [math]::Round((Get-Item $exe).Length / 1KB, 1)
          Write-Host "OK — Launcher: $exe ($size KB)"

      # ── Instalar Inno Setup via Chocolatey (preinstalado en runners) ──────
      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          Write-Host "OK — Inno Setup installed via Chocolatey."

      # ── Build installer ───────────────────────────────────────────────────
      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          .\scripts\windows\build-installer.ps1 -Version $env:VERSION -InnoSetupPath $iscc

      - name: Verify installer binary
        shell: pwsh
        run: |
          $exes = Get-ChildItem "dist" -Filter "docker-labs-setup-*.exe"
          if ($exes.Count -eq 0) {
            Write-Error "No installer found in dist\"
          }
          foreach ($f in $exes) {
            $size = [math]::Round($f.Length / 1MB, 2)
            Write-Host "OK — Installer: $($f.Name) ($size MB)"
          }

      # ── Upload artefacto (siempre, para inspección) ───────────────────────
      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-labs-setup-${{ steps.version.outputs.version }}
          path: dist/docker-labs-setup-*.exe
          retention-days: 30

      # ── Adjuntar al GitHub Release (solo en push de tag) ──────────────────
      - name: Upload to GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $installer = Get-ChildItem "dist" -Filter "docker-labs-setup-*.exe" |
                       Sort-Object LastWriteTime -Descending |
                       Select-Object -First 1
          if (-not $installer) {
            Write-Error "Installer not found for upload."
          }
          Write-Host "Uploading $($installer.Name) to release ${{ github.ref_name }}..."
          gh release upload "${{ github.ref_name }}" "$($installer.FullName)" --clobber
          Write-Host "Done. Asset disponible en:"
          Write-Host "  https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
