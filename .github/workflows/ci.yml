name: CI - Docker Compose Labs

on:
  push:
  pull_request:

jobs:
  quality-python:
    name: Python quality (05-postgres-api)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        working-directory: 05-postgres-api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Inventory Core tests
        working-directory: 05-postgres-api
        run: |
          pytest -q

  quality-node:
    name: Node quality (09-multi-service-app)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: 09-multi-service-app/backend
        run: |
          npm ci

      - name: Run Operations Portal tests
        working-directory: 09-multi-service-app/backend
        run: |
          npm test

  discover:
    name: Discover compose targets
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.set-matrix.outputs.targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure jq
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - id: set-matrix
        name: Build matrix (supported compose entrypoints)
        shell: bash
        run: |
          set -euo pipefail

          # Labs excluidos del CI automatico — razon documentada:
          #   11-elasticsearch-search : requiere >=6 GB RAM, fuera del limite del runner
          #   12-jenkins-ci           : arranque Jenkins >3 min, supera timeout de CI
          # Estos labs son validos en entornos locales con recursos suficientes.
          CI_EXCLUDE="^(11-elasticsearch-search|12-jenkins-ci)/"

          # docker-compose.yml soportados dentro del workspace actual
          mapfile -t compose_files < <(find . -maxdepth 2 -type f -name 'docker-compose.yml' -print \
            | sed 's|^\./||' | sort -u \
            | grep -Ev "$CI_EXCLUDE")

          if [ "${#compose_files[@]}" -eq 0 ]; then
            echo "No se encontraron docker-compose.yml soportados"
            exit 1
          fi

          targets_json="$(printf '%s\n' "${compose_files[@]}" | jq -R -s -c '
            split("\n")[:-1]
            | map({
                path: .,
                dir: (if (contains("/")) then (split("/")[0:-1] | join("/")) else "." end),
                file: (split("/") | last)
              })
          ')"

          echo "targets=$targets_json" >> "$GITHUB_OUTPUT"

          echo "Targets detectados:"
          echo "$targets_json" | jq .

  test:
    name: Compose test (${{ matrix.target.path }})
    needs:
      - discover
      - quality-python
      - quality-node
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover.outputs.targets) }}

    # Defaults para evitar que 02-php-lamp falle por variables DB_* vacías
    env:
      DB_NAME: lamp_db
      DB_USER: lamp_user
      DB_PASS: lamp_pass
      DB_ROOT: root_pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure jq
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Verify CI script exists
        shell: bash
        run: |
          set -euo pipefail
          test -f scripts/ci-compose-test.sh
          chmod +x scripts/ci-compose-test.sh

      - name: Run compose test
        shell: bash
        run: |
          set -euo pipefail
          scripts/ci-compose-test.sh "${{ matrix.target.path }}"

  smoke-platform:
    name: Smoke — plataforma core (05 + 09 + 06)
    needs:
      - quality-python
      - quality-node
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Arrancar Inventory Core (05-postgres-api)
        run: |
          docker compose -p smoke-05 \
            --project-directory 05-postgres-api \
            -f 05-postgres-api/docker-compose.yml \
            up -d --build

      - name: Esperar Inventory Core listo
        run: |
          for i in $(seq 1 36); do
            if curl -sf http://localhost:8000/ready > /dev/null 2>&1; then
              echo "Inventory Core listo."
              break
            fi
            echo "Intento $i/36..."
            sleep 5
          done
          curl -sf http://localhost:8000/health
          curl -sf http://localhost:8000/ready
          curl -sf http://localhost:8000/summary | grep -q '"total_customers"'

      - name: Arrancar Operations Portal (09-multi-service-app)
        run: |
          docker compose -p smoke-09 \
            --project-directory 09-multi-service-app \
            -f 09-multi-service-app/docker-compose.yml \
            up -d --build

      - name: Esperar Operations Portal y verificar integracion con Core
        run: |
          for i in $(seq 1 36); do
            if curl -sf http://localhost:3003/api/health 2>/dev/null | grep -q '"status"'; then
              echo "Operations Portal listo."
              break
            fi
            echo "Intento $i/36..."
            sleep 5
          done
          health=$(curl -sf http://localhost:3003/api/health)
          echo "Portal health: $health"
          echo "$health" | grep -q '"inventory":"reachable"' \
            || { echo "Error: Core no alcanzable desde el portal"; exit 1; }

      - name: Arrancar Platform Gateway (06-nginx-proxy)
        run: |
          docker compose -p smoke-06 \
            --project-directory 06-nginx-proxy \
            -f 06-nginx-proxy/docker-compose.yml \
            up -d --build

      - name: Esperar Gateway listo
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8085/gateway-health > /dev/null 2>&1; then
              echo "Gateway listo."
              break
            fi
            echo "Intento $i/20..."
            sleep 3
          done
          curl -sf http://localhost:8085/gateway-health

      - name: Smoke test — flujo completo Core → Portal → Gateway
        run: |
          echo "--- Inventory Core (05) ---"
          curl -sf http://localhost:8000/summary  | grep -q '"total_customers"'  && echo "Core summary OK"
          curl -sf http://localhost:8000/insights | grep -q '"restock_recommendations"' && echo "Core insights OK"

          echo "--- Operations Portal (09) ---"
          curl -sf http://localhost:3003/api/health   | grep -q '"status"'                 && echo "Portal health OK"
          curl -sf http://localhost:3003/api/health   | grep -q '"inventory":"reachable"'  && echo "Portal-Core integration OK"
          curl -sf http://localhost:3003/api/overview | grep -q '"summary"'                && echo "Portal overview OK"

          echo "--- Platform Gateway (06) ---"
          curl -sf http://localhost:8085/gateway-health && echo "Gateway OK"

          echo "Todos los smoke checks pasaron."

      - name: Teardown
        if: always()
        run: |
          docker compose -p smoke-05 --project-directory 05-postgres-api  -f 05-postgres-api/docker-compose.yml  down -v --remove-orphans || true
          docker compose -p smoke-09 --project-directory 09-multi-service-app -f 09-multi-service-app/docker-compose.yml down -v --remove-orphans || true
          docker compose -p smoke-06 --project-directory 06-nginx-proxy    -f 06-nginx-proxy/docker-compose.yml   down -v --remove-orphans || true
