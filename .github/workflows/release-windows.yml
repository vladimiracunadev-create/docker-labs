name: Release - Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version or tag to package (example: v1.5.0)
        required: true
        type: string
  release:
    types:
      - published

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            $version = "${{ github.event.release.tag_name }}"
          } else {
            $version = "${{ inputs.version }}"
          }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install launcher build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r launcher/requirements-build.txt

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Validate Windows packaging
        shell: pwsh
        run: ./scripts/windows/Test-WindowsPackaging.ps1

      - name: Build Windows installer and portable archive
        shell: pwsh
        run: ./scripts/windows/Build-Installer.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-labs-windows-${{ steps.version.outputs.value }}
          path: dist/windows/release/*

      - name: Attach assets to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/windows/release/*
