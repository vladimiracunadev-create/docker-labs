services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus_monitoring
    ports:
      - "9091:9090"  # 9091 on host: avoids conflict with Docker Labs Control Center (9090)
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  grafana:
    image: grafana/grafana
    container_name: grafana_monitoring
    ports:
      - "3002:3000"  # 3002 on host: avoids conflict with 09-multi-service-app backend
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
