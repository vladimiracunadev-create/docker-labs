services:
  frontend:
    image: nginx:alpine
    container_name: multi_frontend
    ports:
      - "8083:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 32M

  backend:
    build: ./backend
    container_name: multi_backend
    ports:
      - "3003:3000"
    environment:
      PORT: 3000
      INVENTORY_API_BASE_URL: http://host.docker.internal:8000
      MONGODB_URL: mongodb://db:27017/operations_portal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 15
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  db:
    image: mongo:7
    container_name: multi_db
    ports:
      - "27017:27017"
    volumes:
      - multi_db_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 15s
      timeout: 15s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

volumes:
  multi_db_data:
