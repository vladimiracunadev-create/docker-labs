services:
  api:
    build: .
    container_name: elasticsearch_api
    ports:
      - "8001:8000"  # 8001 on host: avoids conflict with Inventory Core (05-postgres-api) on 8000
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: elasticsearch_search
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9200/_cluster/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
