services:
  nginx:
    build: .
    container_name: platform_gateway
    ports:
      - "8085:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # /gateway-health es el endpoint dedicado (retorna 200 "ok" sin dependencias).
      # Usar este endpoint en lugar de "/" evita depender de try_files/index.html.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/gateway-health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 32M
