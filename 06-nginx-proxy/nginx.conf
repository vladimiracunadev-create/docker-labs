events {}

http {
  server {
    listen 80;
    server_name _;

    location = /gateway-health {
      add_header Content-Type text/plain;
      return 200 'ok';
    }

    location = / {
      root /usr/share/nginx/html;
      try_files /index.html =404;
    }

    location = /control {
      return 302 /control/;
    }

    location /control/ {
      proxy_pass http://host.docker.internal:9090/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dashboard.css {
      proxy_pass http://host.docker.internal:9090/dashboard.css;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location /dashboard.js {
      proxy_pass http://host.docker.internal:9090/dashboard.js;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location /api/ {
      proxy_pass http://host.docker.internal:9090/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /portal {
      return 302 /portal/;
    }

    location /portal/ {
      proxy_pass http://host.docker.internal:8083/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /core {
      return 302 /core/;
    }

    location /core/ {
      proxy_pass http://host.docker.internal:8000/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /docs {
      proxy_pass http://host.docker.internal:8000/docs;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location /docs/ {
      proxy_pass http://host.docker.internal:8000/docs/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /openapi.json {
      proxy_pass http://host.docker.internal:8000/openapi.json;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /summary {
      proxy_pass http://host.docker.internal:8000/summary;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location = /ready {
      proxy_pass http://host.docker.internal:8000/ready;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location /customers {
      proxy_pass http://host.docker.internal:8000/customers;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location /products {
      proxy_pass http://host.docker.internal:8000/products;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location /orders {
      proxy_pass http://host.docker.internal:8000/orders;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }
  }
}
