apiVersion: v1
kind: Secret
metadata:
  name: inventory-core-secrets
type: Opaque
stringData:
  POSTGRES_DB: inventory
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  DATABASE_URL: postgresql://postgres:postgres@postgres-service:5432/inventory
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-core-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-core-api
  template:
    metadata:
      labels:
        app: inventory-core-api
    spec:
      containers:
        - name: api
          image: your-registry/inventory-core-api:v1
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: inventory-core-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: inventory-core-postgres
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: inventory-core-postgres
  template:
    metadata:
      labels:
        app: inventory-core-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: inventory-core-secrets
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-api-service
spec:
  selector:
    app: inventory-core-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  selector:
    app: inventory-core-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
